<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discharge Medication Communication Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .patient-box {
            width: 22%;
            min-height: 140px;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            background-color: white;
        }

        .delete-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 0.75rem;
        }

        .legend-box {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            margin-right: 20px;
        }

        .legend-color {
            width: 25px;
            height: 25px;
            border: 2px solid black;
            margin-right: 8px;
        }
    </style>
</head>

<body class="bg-light">

    <!-- Top Bar -->
    <nav class="navbar navbar-dark bg-primary p-3">
        <div class="container-fluid d-flex align-items-center">
            <input type="date" id="datePicker" class="form-control w-auto me-3">
            <span id="selectedDate" class="text-white fs-5 flex-grow-1"></span>
        </div>
    </nav>

    <!-- Input Section -->
    <div class="container mt-4">
        <div class="row g-2">
            <div class="col-md-2">
                <input id="initials" class="form-control" placeholder="Initials">
            </div>
            <div class="col-md-2">
                <input id="room" class="form-control" placeholder="Room (R)">
            </div>
            <div class="col-md-2">
                <input id="bed" class="form-control" placeholder="Bed (B)">
            </div>
            <div class="col-md-2">
                <input id="cubicle" maxlength="3" class="form-control" placeholder="Cubicle (max 3)">
            </div>
            <div class="col-md-2">
                <button id="addBtn" class="btn btn-success w-100">Add</button>
            </div>
        </div>
    </div>

    <!-- Boxes Container -->
    <div class="container mt-4">
        <div id="boxContainer" class="d-flex flex-wrap"></div>
    </div>

    <!-- Legend Section -->
    <div class="container mt-4">
        <div class="d-flex flex-wrap align-items-center">

            <div class="legend-box">
                <div class="legend-color" style="background:white;"></div>
                <span>Not prescribed</span>
            </div>

            <div class="legend-box">
                <div class="legend-color" style="background:red;"></div>
                <span>Prescribed</span>
            </div>

            <div class="legend-box">
                <div class="legend-color" style="background:yellow;"></div>
                <span>Currently dispensing</span>
            </div>

            <div class="legend-box">
                <div class="legend-color" style="background:lightgreen;"></div>
                <span>Dispensed</span>
            </div>

        </div>
    </div>

<script>
    const boxContainer = document.getElementById("boxContainer");
    const addBtn = document.getElementById("addBtn");
    const colorCycle = ["white", "red", "yellow", "lightgreen"];

    // DATE PICKER
    document.getElementById("datePicker").addEventListener("change", function () {
        const date = new Date(this.value);
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById("selectedDate").textContent = date.toLocaleDateString(undefined, options);
    });

    // MUTUAL EXCLUSION
    const roomInput = document.getElementById("room");
    const bedInput = document.getElementById("bed");
    const cubicleInput = document.getElementById("cubicle");

    roomInput.addEventListener("input", () => {
        if (roomInput.value.trim() !== "") cubicleInput.value = "";
    });

    bedInput.addEventListener("input", () => {
        if (bedInput.value.trim() !== "") cubicleInput.value = "";
    });

    cubicleInput.addEventListener("input", () => {
        if (cubicleInput.value.trim() !== "") {
            roomInput.value = "";
            bedInput.value = "";
        }
    });

    // ADD BUTTON
    addBtn.addEventListener("click", () => {
        const initials = document.getElementById("initials").value.trim();
        const room = roomInput.value.trim();
        const bed = bedInput.value.trim();
        const cubicle = cubicleInput.value.trim();

        if (!initials) {
            alert("Please enter initials.");
            return;
        }

        let label = "";
        let sortRoom = "";
        let sortBed = "";
        let sortCubicle = "";

        if (cubicle) {
            label = cubicle.toUpperCase();
            sortCubicle = cubicle.toUpperCase();
        } else if (room && bed) {
            label = `R${room}B${bed}`;
            sortRoom = room;
            sortBed = bed;
        } else {
            alert("Enter either Room + Bed OR Cubicle.");
            return;
        }

        createBox(initials, label, sortRoom, sortCubicle, sortBed);
        sortBoxes();
    });

    // CREATE BOX
    function createBox(initials, label, room, cubicle, bed) {
        const box = document.createElement("div");
        box.className = "patient-box";
        box.dataset.room = room;
        box.dataset.cubicle = cubicle;
        box.dataset.bed = bed;
        box.dataset.colorIndex = 0;

        box.innerHTML = `
            <div class="fw-bold">${label}</div>
            <div class="mt-3 fs-4">${initials}</div>
            <button class="btn btn-danger btn-sm delete-btn">X</button>
        `;

        // Color cycle
        box.addEventListener("click", (e) => {
            if (e.target.classList.contains("delete-btn")) return;

            let index = parseInt(box.dataset.colorIndex);
            index = (index + 1) % colorCycle.length;
            box.dataset.colorIndex = index;
            box.style.backgroundColor = colorCycle[index];
        });

        // Delete
        box.querySelector(".delete-btn").addEventListener("click", () => {
            box.remove();
        });

        boxContainer.appendChild(box);
    }

    // SORTING
    function sortBoxes() {
        const boxes = Array.from(boxContainer.children);

        boxes.sort((a, b) => {
            const rA = a.dataset.room || "";
            const rB = b.dataset.room || "";
            const cA = a.dataset.cubicle || "";
            const cB = b.dataset.cubicle || "";
            const bA = a.dataset.bed || "";
            const bB = b.dataset.bed || "";

            if (rA && rB) return (rA - rB) || (bA - bB);
            if (cA && cB) return cA.localeCompare(cB);
            if (rA && !rB) return -1;
            if (!rA && rB) return 1;

            return 0;
        });

        boxes.forEach(box => boxContainer.appendChild(box));
    }
</script>

</body>
</html>
