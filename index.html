<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Discharge Medication Communication Tool</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.patient-box {
    width: 22%;
    min-height: 160px;
    border: 2px solid #ccc;
    border-radius: 8px;
    margin: 10px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    position: relative;
    background-color: white;
}

.edit-btn {
    position: absolute;
    bottom: 5px;
    left: 5px;
    font-size: 0.75rem;
}
.delete-btn {
    position: absolute;
    bottom: 5px;
    right: 5px;
    font-size: 0.75rem;
}

.legend-box {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            margin-right: 20px;
        }

        .legend-color {
            width: 25px;
            height: 25px;
            border: 2px solid black;
            margin-right: 8px;
        }

.toggle-btn {
    background: white;
    border: 2px solid #ccc;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    margin: 3px;
    font-size: 0.75rem;
}
.toggle-btn.active {
    background: green;
    color: white;
}

.pink-tag {
    background: pink;
    padding: 3px 6px;
    border-radius: 4px;
    display: inline-block;
    margin: 2px;
}

.tick {
    color: darkgreen;
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary p-3">
    <input type="date" id="datePicker" class="form-control w-auto me-3">
    <span id="selectedDate" class="text-white fs-5"></span>
</nav>

<div class="container mt-4">
<div class="row g-2">
    <div class="col-md-2"><input id="initials" class="form-control" placeholder="Initials"></div>
    <div class="col-md-2"><input id="room" class="form-control" placeholder="Room"></div>
    <div class="col-md-2"><input id="bed" class="form-control" placeholder="Bed"></div>
    <div class="col-md-2"><input id="cubicle" class="form-control" placeholder="Cubicle"></div>
    <div class="col-md-2"><input id="queries" class="form-control" placeholder="Queries"></div>
    <div class="col-md-2"><button id="addBtn" class="btn btn-success w-100">Add</button></div>
</div>

<div class="mt-3">
    <button class="toggle-btn" data-tag="Blister pack">Blister pack</button>
    <button class="toggle-btn" data-tag="CDs">CDs</button>
    <button class="toggle-btn" data-tag="EOL">EOL</button>
    <button class="toggle-btn" data-tag="MARS">MARS</button>
</div>
</div>

<div class="container mt-4">
    <div id="boxContainer" class="d-flex flex-wrap"></div>
</div>


<!-- Legend Section -->
<div class="container mt-4">
    <div class="d-flex flex-wrap align-items-center" id="legend">

        <div class="legend-box">
            <div class="legend-color" style="background:white;"></div>
            <span>Not prescribed</span>
        </div>

        <div class="legend-box">
            <div class="legend-color" style="background:red;"></div>
            <span>Prescribed</span>
        </div>

        <div class="legend-box">
            <div class="legend-color" style="background:#add8e6;"></div>
            <span>Screened</span>
        </div>

        <div class="legend-box">
            <div class="legend-color" style="background:yellow;"></div>
            <span>Currently dispensing</span>
        </div>

        <div class="legend-box">
            <div class="legend-color" style="background:lightgreen;"></div>
            <span>Dispensed</span>
        </div>

        <div class="legend-box">
            <div class="legend-color" style="background:darkgreen;"></div>
            <span>On ward</span>
        </div>

    </div>
</div>


<script>
const boxContainer = document.getElementById("boxContainer");
const toggleButtons = document.querySelectorAll(".toggle-btn");
const colorCycle = ["white","red","#add8e6","yellow","lightgreen","darkgreen"];

toggleButtons.forEach(b=>b.onclick=()=>b.classList.toggle("active"));

datePicker.onchange=e=>selectedDate.textContent=new Date(e.target.value).toDateString();

addBtn.onclick=()=>{
    const i=initials.value.trim(), r=room.value.trim(), b=bed.value.trim(), c=cubicle.value.trim();
    if(!i) return alert("Initials required");
    if(!c && !(r&&b)) return alert("Room+Bed or Cubicle required");

    const label=c?c.toUpperCase():`R${r}B${b}`;
    const tags=[...toggleButtons].filter(t=>t.classList.contains("active")).map(t=>t.dataset.tag);

    createBox(i,label,r,b,c,queries.value.trim(),tags);
    [initials,room,bed,cubicle,queries].forEach(x=>x.value="");
    toggleButtons.forEach(t=>t.classList.remove("active"));
};

function createBox(i,l,r,b,c,q,tags){
    const box=document.createElement("div");
    box.className="patient-box";
    box.dataset.room=r; box.dataset.bed=b; box.dataset.cubicle=c;
    box.dataset.colorIndex="0";
    renderDisplay(box,i,l,q,tags);
    boxContainer.appendChild(box);

    box.addEventListener("click",e=>{
        if(box.dataset.editing==="true") return;
        if(e.target.tagName==="BUTTON") return;

        let idx=parseInt(box.dataset.colorIndex);
        idx=(idx+1)%colorCycle.length;
        box.dataset.colorIndex=idx;
        box.style.backgroundColor=colorCycle[idx];
    });
}

/* NORMAL DISPLAY */
function renderDisplay(box,i,l,q,tags){
    box.innerHTML=`
        <div class="fw-bold label">${l}</div>
        <div class="fs-4 initials">${i}</div>
        <div class="queries">${q}</div>
        <div class="tags">${tags.map(t=>`<span class="pink-tag">${t}</span>`).join("")}</div>
        <button class="btn btn-secondary btn-sm edit-btn">Edit</button>
        <button class="btn btn-danger btn-sm delete-btn">X</button>
    `;
    bindDisplayButtons(box);
}

/* DISPLAY BUTTONS */
function bindDisplayButtons(box){
    box.querySelector(".delete-btn").onclick=e=>{
        e.stopPropagation(); box.remove();
    };

    box.querySelector(".edit-btn").onclick=e=>{
        e.stopPropagation(); enterEditMode(box);
    };
}

/* EDIT MODE */
function enterEditMode(box){
    box.dataset.editing="true";

    const i=box.querySelector(".initials").textContent;
    const q=box.querySelector(".queries").textContent;
    const tags=[...box.querySelectorAll(".pink-tag")].map(t=>t.textContent);

box.innerHTML=`
<input class="form-control form-control-sm i" value="${i}">
<input class="form-control form-control-sm r" value="${box.dataset.room}" placeholder="Room">
<input class="form-control form-control-sm b" value="${box.dataset.bed}" placeholder="Bed">
<input class="form-control form-control-sm c" value="${box.dataset.cubicle}" placeholder="Cubicle">
<input class="form-control form-control-sm q" value="${q}">
<div>
${["Blister pack","CDs","EOL","MARS"].map(t=>`
<button class="toggle-btn ${tags.includes(t)?"active":""}" data-tag="${t}">${t}</button>`).join("")}
</div>
<div class="mt-2 d-flex justify-content-between">
<button class="btn btn-success btn-sm save">Confirm</button>
<button class="btn btn-secondary btn-sm cancel">Cancel</button>
</div>
`;

box.querySelectorAll(".toggle-btn").forEach(b=>b.onclick=e=>{e.stopPropagation();b.classList.toggle("active");});

box.querySelector(".cancel").onclick=e=>{
e.stopPropagation();
renderDisplay(box,i,box.querySelector(".label")?.textContent||"",q,tags);
box.dataset.editing="false";
};

box.querySelector(".save").onclick=e=>{
e.stopPropagation();
const r=box.querySelector(".r").value,b=box.querySelector(".b").value,c=box.querySelector(".c").value;
const l=c?c.toUpperCase():`R${r}B${b}`;
box.dataset.room=r; box.dataset.bed=b; box.dataset.cubicle=c;

renderDisplay(
box,
box.querySelector(".i").value,
l,
box.querySelector(".q").value,
[...box.querySelectorAll(".toggle-btn.active")].map(t=>t.dataset.tag)
);
box.dataset.editing="false";
};
}
</script>
</body>
</html>
``
